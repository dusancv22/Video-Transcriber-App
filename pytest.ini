[pytest]
markers =
    integration: tests that exercise multiple components or slower workflows
    repetition_fix: tests covering repetition prevention and overlap handling
    slow: tests that may take longer than normal unit tests
    text_combining: tests for transcript segment overlap removal
    text_processing: tests for transcript text cleanup and formatting
    translation: tests for subtitle translation engines
    unit: focused tests for a single component
    whisper: tests for Whisper manager configuration and behavior
filterwarnings =
    ignore:pkg_resources is deprecated as an API:DeprecationWarning:ctranslate2
